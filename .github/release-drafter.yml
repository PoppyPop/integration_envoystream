name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
no-changes-template: "No changes."

categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
      - "maintenance"
  - title: "📝 Documentation"
    labels:
      - "documentation"

exclude-labels:
  - "skip-changelog"
  - "duplicate"
  - "question"
  - "invalid"
  - "wontfix"

sort-by: merged_at
autolabeler:
  - label: "feature"
    title: ["feat", "feature"]
  - label: "bug"
    title: ["fix", "bug"]

template: |
  ## Changes
  $CHANGES

  $CONTRIBUTORS
